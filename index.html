        };

            if (!dateString) return '';
            const d = new Date(dateString + 'T00:00:00'); 
            if (isNaN(d.getTime())) return dateString;
            const months = ['Jan', 'Feb', 'Mar', 'Apr', 'Mei', 'Jun', 'Jul', 'Ags', 'Sep', 'Okt', 'Nov', 'Des'];
            return `${d.getDate()} ${months[d.getMonth()]} ${d.getFullYear()}`;
        };

            if (!dateString) return '';
            const d = new Date(dateString + 'T00:00:00'); 
            if (isNaN(d.getTime())) return dateString;
            const days = ['Minggu', 'Senin', 'Selasa', 'Rabu', 'Kamis', 'Jumat', 'Sabtu'];
            const months = ['Jan', 'Feb', 'Mar', 'Apr', 'Mei', 'Jun', 'Jul', 'Ags', 'Sep', 'Okt', 'Nov', 'Des'];
            return `${days[d.getDay()]}, ${d.getDate()} ${months[d.getMonth()]} ${d.getFullYear()}`;
        };

        const formatDate = (dateString) => {
            if (!dateString) return '';
            const date = new Date(dateString);
            if (isNaN(date.getTime())) return dateString;
            const d = String(date.getDate()).padStart(2, '0');

            const verifyAndKirim = () => { if (parseInt(captchaInput) === captcha.num1 + captcha.num2) { setShowCaptcha(false); processPDF(); } else { setCaptchaError(true); generateCaptcha(); } };

            const processPDF = () => {
                setIsGenerating(true);
                const element = document.getElementById('pdf-content');
                const filename = `ACMS_03_${formData.namaLengkap.replace(/\s+/g, '_')}.pdf`;
                const opt = { margin: [15, 15, 15, 15], filename: filename, image: { type: 'jpeg', quality: 0.98 }, html2canvas: { scale: 2, useCORS: true }, jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' } };
                html2pdf().set(opt).from(element).save().then(() => {
                    setIsGenerating(false); setStep('success');
                    const subject = encodeURIComponent(`Permohonan Pindah Masuk ACMS - ${formData.namaLengkap}`);
                    const body = encodeURIComponent(`Syalom Admin,\n\nBerikut saya lampirkan dokumen PDF permohonan pindah keanggotaan (ACMS) atas nama ${formData.namaLengkap} yang baru saja saya unduh dari aplikasi ART1S.\n\nTerima kasih.\n\n(Mohon jangan lupa untuk melampirkan file ${filename} yang baru saja terdownload ke dalam email ini)`);
                    window.location.href = `mailto:admin@tidar1.org?subject=${subject}&body=${body}`;
                });
            };

            if (step === 'success') {
                return (
                    <div className="bg-white p-8 rounded-xl shadow-sm border border-gray-100 text-center animate-fade-in"><div className="w-16 h-16 md:w-20 md:h-20 bg-green-100 text-green-600 rounded-full flex items-center justify-center mx-auto mb-5"><Icon name="Download" className="w-8 h-8 md:w-10 md:h-10" /></div><h2 className="text-2xl md:text-3xl font-bold text-gray-800 mb-3">Dokumen Berhasil Dibuat!</h2><p className="text-sm md:text-base text-gray-600 mb-3">File PDF permohonan Anda telah berhasil <b>diunduh</b> ke perangkat Anda.</p><p className="text-sm md:text-base text-gray-500 mb-8 bg-yellow-50 p-5 rounded-xl text-left border border-yellow-200"><b>Langkah Selanjutnya:</b> Aplikasi email Anda akan terbuka secara otomatis. <b>Silakan "Attach / Lampirkan" file PDF yang baru saja terunduh tersebut ke dalam email</b>, lalu klik Kirim ke admin@tidar1.org.</p><button onClick={() => setActiveTab('pindah_masuk')} className="bg-green-600 hover:bg-green-700 text-white px-6 py-3 rounded-lg font-bold transition text-sm md:text-base shadow-md">Selesai & Kembali</button></div>
                );
            }

            if (step === 'preview') {
                return (
                    <div className="space-y-6 animate-fade-in relative">
                        {showCaptcha && (
                            <div className="fixed inset-0 z-[100] flex items-center justify-center bg-black bg-opacity-60 px-4 backdrop-blur-sm">
                                <div className="bg-white rounded-xl shadow-2xl p-6 md:p-8 max-w-sm w-full animate-fade-in"><div className="flex items-center space-x-2 mb-3 text-green-600"><Icon name="LogIn" className="w-6 h-6" /><h3 className="text-xl md:text-2xl font-bold text-gray-800">Verifikasi Keamanan</h3></div><p className="text-sm md:text-base text-gray-600 mb-5">Untuk menghindari spam otomatis, silakan selesaikan perhitungan berikut sebelum mengunduh & mengirim formulir:</p><div className="flex items-center justify-center space-x-4 mb-5 bg-gray-50 p-5 rounded-xl border border-gray-200"><span className="text-2xl md:text-3xl font-bold text-gray-800">{captcha.num1} + {captcha.num2} =</span><input type="number" value={captchaInput} onChange={(e) => setCaptchaInput(e.target.value)} className={`w-24 p-2 md:p-3 border ${captchaError ? 'border-red-400 bg-red-50' : 'border-gray-300'} rounded-lg focus:ring-2 focus:ring-green-500 text-xl md:text-2xl text-center outline-none transition`} autoFocus onKeyDown={(e) => { if (e.key === 'Enter') verifyAndKirim(); }} /></div>{captchaError && <p className="text-red-500 text-sm mb-4 text-center font-bold animate-pulse">Jawaban salah, silakan coba lagi.</p>}<div className="flex justify-end space-x-3 mt-6"><button onClick={() => setShowCaptcha(false)} className="px-5 py-2.5 text-gray-600 hover:bg-gray-100 rounded-lg transition font-bold text-sm md:text-base">Batal</button><button onClick={verifyAndKirim} className="px-6 py-2.5 bg-green-600 hover:bg-green-700 text-white rounded-lg transition font-bold shadow-md text-sm md:text-base">Verifikasi & Kirim</button></div></div>
                            </div>
                        )}
                        <div className="flex justify-between items-center"><button onClick={() => setStep('fill')} className="text-gray-600 font-medium flex items-center hover:text-gray-900 text-sm md:text-base">&larr; Edit Kembali Formulir</button><button onClick={handleKirimClick} disabled={isGenerating} className={`${isGenerating ? 'bg-gray-400' : 'bg-green-600 hover:bg-green-700'} text-white px-5 py-2.5 rounded-lg font-bold transition flex items-center shadow-md text-sm md:text-base`}>{isGenerating ? 'Memproses PDF...' : 'Kirim (Unduh PDF)'}</button></div>
                        <div className="bg-gray-200 shadow-inner overflow-x-auto border border-gray-300 rounded-xl p-4 sm:p-8">
                            <div className="w-max mx-auto shadow-xl bg-white"><div id="pdf-content" className="p-10 bg-white text-black text-sm relative" style={{ width: '210mm', minHeight: '297mm', fontFamily: '"Open Sans", sans-serif', boxSizing: 'border-box' }}><p className="text-[10px] text-gray-500 absolute top-4 right-10">Form ACMS-03</p><div className="flex justify-between items-center mb-10 mt-6"><div className="w-[180px] flex justify-start"><img src="https://i.postimg.cc/dQhq2HGf/png-acms-new-logo.png" alt="ACMS Logo" crossOrigin="anonymous" className="h-[60px] object-contain" /></div><div className="flex-1 text-center px-4"><h2 className="font-bold text-[16px] leading-tight">PERMOHONAN PERPINDAHAN ANGGOTA</h2><h2 className="font-bold text-[16px] leading-tight mt-1">GMAHK KONFERENS JAWA KAWASAN TIMUR</h2><h2 className="font-bold text-[16px] leading-tight mt-1">JEMAAT TIDAR 1 SURABAYA</h2></div><div className="w-[180px] flex flex-col items-center"><div className="border border-black bg-[#dce6f1] font-bold py-1 w-full text-center text-[12px]">DIISI OLEH PEMOHON</div><p className="italic text-center mt-1 text-[12px] leading-snug">Bagi Pemohon yang namanya <br/><span className="font-bold not-italic">SUDAH</span> ada di ACMS</p></div></div><div className="mb-6"><p className="font-bold mb-2">A. PROFIL PEMOHON <span className="font-normal text-xs">(Mohon diisi sesuai dengan KTP/Akte Kelahiran / identitas lainnya menggunakan huruf besar)</span></p><table className="w-full ml-4"><tbody><tr><td className="w-1/4 py-1">1. Nama Lengkap</td><td className="w-3/4 py-1">: <span className="uppercase">{formData.namaLengkap}</span></td></tr><tr><td className="w-1/4 py-1">2. Jenis Kelamin</td><td className="w-3/4 py-1">: {formData.jenisKelamin}</td></tr><tr><td className="w-1/4 py-1">3. Tanggal Lahir</td><td className="w-3/4 py-1">: {formatDate(formData.tanggalLahir)}</td></tr><tr><td className="w-1/4 py-1">4. Nama Ibu</td><td className="w-3/4 py-1">: <span className="uppercase">{formData.namaIbu}</span></td></tr><tr><td className="w-1/4 py-1">5. Baptisan</td><td className="w-3/4 py-1"></td></tr><tr><td className="w-1/4 py-1 pl-4">- tanggal</td><td className="w-3/4 py-1">: {formatDate(formData.baptisanTanggal)}</td></tr><tr><td className="w-1/4 py-1 pl-4">- tempat</td><td className="w-3/4 py-1">: {formData.baptisanTempat}</td></tr><tr><td className="w-1/4 py-1 pl-4">- pendeta</td><td className="w-3/4 py-1">: {formData.baptisanPendeta}</td></tr></tbody></table></div><div className="mb-8"><p className="font-bold mb-2">B. PERNYATAAN PEMOHON</p><table className="w-full ml-4 mb-4"><tbody><tr><td className="w-[80%] py-1">1. Apakah Anda dalam masa disiplin Gereja?</td><td className="w-[20%] py-1 font-bold">: {formData.masaDisiplin}</td></tr><tr><td className="w-[80%] py-1">2. Apakah Anda sudah pernah mengajukan permohonan perpindahan keanggotaan?</td><td className="w-[20%] py-1 font-bold">: {formData.pernahPindah}</td></tr></tbody></table><p className="mb-2">Dengan ini saya memohon agar memindahkan keanggotaan saya dari:</p><table className="w-full ml-4 mb-4"><tbody><tr><td className="w-1/4 py-1">1. Nama Jemaat Asal</td><td className="w-3/4 py-1">: <span className="uppercase">{formData.jemaatAsalNama}</span></td></tr><tr><td className="w-1/4 py-1 align-top">2. Alamat Jemaat Asal</td><td className="w-3/4 py-1">: {formData.jemaatAsalAlamat}</td></tr><tr><td className="w-1/4 py-1">3. Nama Sekretaris</td><td className="w-3/4 py-1">: <span className="uppercase">{formData.jemaatAsalSekretaris}</span></td></tr><tr><td className="w-1/4 py-1">4. Telp/Email Aktif</td><td className="w-3/4 py-1">: {formData.jemaatAsalKontak}</td></tr></tbody></table><p className="mb-6">Demikian permohonan ini saya ajukan tanpa ada paksaan dari pihak manapun.</p><div className="flex justify-end pr-10"><div className="text-center w-64"><p>Tempat/Tanggal diajukan:</p><p className="mb-16">Surabaya, {formatDate(new Date())}</p><p className="border-t border-black pt-1 uppercase">( {formData.namaLengkap || '..........................'} )</p><p>Nama dan Tanda Tangan Pemohon</p></div></div></div><div className="mb-6 mt-12 pt-8 border-t-2 border-dashed border-gray-400"><p className="font-bold text-center mb-6">DIISI OLEH SEKRETARIS JEMAAT</p><p className="font-bold mb-2">C. DATA KEPUTUSAN MAJELIS</p><table className="w-full ml-4"><tbody><tr><td className="w-1/3 py-2">1. Keputusan Majelis Tanggal</td><td className="w-2/3 py-2 border-b border-dotted border-gray-400">: </td></tr><tr><td className="w-1/3 py-2">Nomor Keputusan</td><td className="w-2/3 py-2 border-b border-dotted border-gray-400">: </td></tr><tr><td className="w-1/3 py-2">2. Di proses tanggal</td><td className="w-2/3 py-2 border-b border-dotted border-gray-400">: </td></tr><tr><td className="w-1/3 py-2">3. Ketua Jemaat</td><td className="w-2/3 py-2 border-b border-dotted border-gray-400">: </td></tr><tr><td className="w-1/3 py-2">4. Gembala Jemaat</td><td className="w-2/3 py-2 border-b border-dotted border-gray-400">: </td></tr></tbody></table><div className="flex justify-end pr-10 mt-8"><div className="text-center w-64"><p className="mb-16">20........</p><p className="border-t border-black pt-1">( ........................................ )</p><p>Nama dan Tanda Tangan Sekretaris Jemaat</p></div></div></div><div className="mt-8 pt-4 border-t border-gray-100 flex justify-between items-center text-[11px] text-gray-400 font-sans"><p>ACMS v.3.03</p><p>&copy; Copyright by ART1S Tech Team 2026</p></div></div></div>
                        </div>
                    </div>
                );
            }

            return (
                <div className="space-y-6 animate-fade-in">
                    <button onClick={() => setActiveTab('pindah_masuk')} className="text-blue-600 font-medium flex items-center hover:underline mb-2 text-sm md:text-base">&larr; Kembali ke Pilihan Keanggotaan</button>
                    <div className="bg-white p-6 rounded-xl shadow-sm border border-gray-100">
                        <div className="flex items-center space-x-3 mb-6 border-b pb-4"><Icon name="BookOpen" className="w-8 h-8 md:w-10 md:h-10 text-green-600" /><div><h2 className="text-xl md:text-2xl font-bold text-gray-800">Formulir Pindah Masuk (ACMS)</h2><p className="text-sm md:text-base text-gray-500">Isi data di bawah ini untuk membuat dokumen perpindahan.</p></div></div>
                        <form onSubmit={handleSubmit} className="space-y-8">
                            <div>
                                <h3 className="font-bold text-gray-800 border-b pb-1.5 mb-4 text-base md:text-lg">A. PROFIL PEMOHON</h3>
                                <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                                    <div className="md:col-span-2"><label className="block text-sm md:text-base font-bold text-gray-700 mb-1.5">1. Nama Lengkap (Sesuai KTP/Akte)</label><input type="text" name="namaLengkap" value={formData.namaLengkap} onChange={handleChange} required className="w-full p-2.5 border border-gray-300 rounded-lg focus:ring-2 focus:ring-green-500 uppercase text-sm md:text-base outline-none transition" /></div>
                                    <div><label className="block text-sm md:text-base font-bold text-gray-700 mb-1.5">2. Jenis Kelamin</label><select name="jenisKelamin" value={formData.jenisKelamin} onChange={handleChange} required className="w-full p-2.5 border border-gray-300 rounded-lg bg-white text-sm md:text-base outline-none focus:ring-2 focus:ring-green-500 transition"><option value="Laki-laki">Laki-laki</option><option value="Perempuan">Perempuan</option></select></div>
                                    <div><label className="block text-sm md:text-base font-bold text-gray-700 mb-1.5">3. Tanggal Lahir</label><input type="date" name="tanggalLahir" value={formData.tanggalLahir} onChange={handleChange} required className="w-full p-2.5 border border-gray-300 rounded-lg text-sm md:text-base outline-none focus:ring-2 focus:ring-green-500 transition" /></div>
                                    <div className="md:col-span-2"><label className="block text-sm md:text-base font-bold text-gray-700 mb-1.5">4. Nama Ibu</label><input type="text" name="namaIbu" value={formData.namaIbu} onChange={handleChange} required className="w-full p-2.5 border border-gray-300 rounded-lg uppercase text-sm md:text-base outline-none focus:ring-2 focus:ring-green-500 transition" /></div>
                                    <div className="md:col-span-2 border border-gray-200 p-4 rounded-xl bg-gray-50 mt-2">
                                        <label className="block text-sm md:text-base font-bold text-gray-800 mb-3">5. Data Baptisan</label>
                                        <div className="grid grid-cols-1 md:grid-cols-3 gap-4">
                                            <div><label className="block text-xs md:text-sm font-semibold text-gray-600 mb-1.5">Tanggal Baptis</label><input type="date" name="baptisanTanggal" value={formData.baptisanTanggal} onChange={handleChange} className="w-full p-2.5 border border-gray-300 rounded-lg text-sm md:text-base outline-none focus:ring-2 focus:ring-green-500 transition" /></div>
                                            <div><label className="block text-xs md:text-sm font-semibold text-gray-600 mb-1.5">Tempat</label><input type="text" name="baptisanTempat" value={formData.baptisanTempat} onChange={handleChange} className="w-full p-2.5 border border-gray-300 rounded-lg text-sm md:text-base outline-none focus:ring-2 focus:ring-green-500 transition" /></div>
                                            <div><label className="block text-xs md:text-sm font-semibold text-gray-600 mb-1.5">Pendeta yang melayani</label><input type="text" name="baptisanPendeta" value={formData.baptisanPendeta} onChange={handleChange} className="w-full p-2.5 border border-gray-300 rounded-lg text-sm md:text-base outline-none focus:ring-2 focus:ring-green-500 transition" /></div>
                                        </div>
                                    </div>
                                </div>
                            </div>
                            <div>
                                <h3 className="font-bold text-gray-800 border-b pb-1.5 mb-4 text-base md:text-lg">B. PERNYATAAN PEMOHON</h3>
                                <div className="space-y-4">
                                    <div className="flex flex-col sm:flex-row sm:items-center justify-between bg-gray-50 p-4 rounded-xl border border-gray-200"><label className="text-sm md:text-base font-bold text-gray-700">1. Apakah Anda dalam masa disiplin Gereja?</label><select name="masaDisiplin" value={formData.masaDisiplin} onChange={handleChange} className="mt-3 sm:mt-0 p-2.5 border border-gray-300 rounded-lg bg-white w-full sm:w-32 text-sm md:text-base outline-none focus:ring-2 focus:ring-green-500 transition font-bold"><option value="TIDAK">TIDAK</option><option value="YA">YA</option></select></div>
                                    <div className="flex flex-col sm:flex-row sm:items-center justify-between bg-gray-50 p-4 rounded-xl border border-gray-200"><label className="text-sm md:text-base font-bold text-gray-700">2. Apakah Anda sudah pernah mengajukan pindah?</label><select name="pernahPindah" value={formData.pernahPindah} onChange={handleChange} className="mt-3 sm:mt-0 p-2.5 border border-gray-300 rounded-lg bg-white w-full sm:w-32 text-sm md:text-base outline-none focus:ring-2 focus:ring-green-500 transition font-bold"><option value="BELUM">BELUM</option><option value="SUDAH">SUDAH</option></select></div>
                                    <div className="mt-6"><p className="text-sm md:text-base font-bold text-gray-800 mb-3 border-b pb-2">Dengan ini saya memohon agar memindahkan keanggotaan saya dari:</p>
                                        <div className="grid grid-cols-1 md:grid-cols-2 gap-4 pl-0 md:pl-2">
                                            <div className="md:col-span-2"><label className="block text-xs md:text-sm font-semibold text-gray-600 mb-1.5">1. Nama Jemaat Asal</label><input type="text" name="jemaatAsalNama" value={formData.jemaatAsalNama} onChange={handleChange} required className="w-full p-2.5 border border-gray-300 rounded-lg uppercase text-sm md:text-base outline-none focus:ring-2 focus:ring-green-500 transition" /></div>
                                            <div className="md:col-span-2"><label className="block text-xs md:text-sm font-semibold text-gray-600 mb-1.5">2. Alamat Jemaat Asal</label><input type="text" name="jemaatAsalAlamat" value={formData.jemaatAsalAlamat} onChange={handleChange} required className="w-full p-2.5 border border-gray-300 rounded-lg text-sm md:text-base outline-none focus:ring-2 focus:ring-green-500 transition" /></div>
                                            <div><label className="block text-xs md:text-sm font-semibold text-gray-600 mb-1.5">3. Nama Sekretaris Jemaat Asal</label><input type="text" name="jemaatAsalSekretaris" value={formData.jemaatAsalSekretaris} onChange={handleChange} required className="w-full p-2.5 border border-gray-300 rounded-lg uppercase text-sm md:text-base outline-none focus:ring-2 focus:ring-green-500 transition" /></div>
                                            <div><label className="block text-xs md:text-sm font-semibold text-gray-600 mb-1.5">4. Telp/Email Aktif Sekretaris Asal</label><input type="text" name="jemaatAsalKontak" value={formData.jemaatAsalKontak} onChange={handleChange} required className="w-full p-2.5 border border-gray-300 rounded-lg text-sm md:text-base outline-none focus:ring-2 focus:ring-green-500 transition" /></div>
                                        </div>
                                    </div>
                                </div>
                            </div>
                            <div className="opacity-60 pointer-events-none grayscale mt-8">
                                <h3 className="font-bold text-gray-800 border-b pb-1.5 mb-4 text-base md:text-lg">C. DATA KEPUTUSAN MAJELIS <span className="text-red-600 text-xs md:text-sm ml-2 font-normal">(Hanya diisi oleh Sekretaris Jemaat)</span></h3>
                                <div className="grid grid-cols-1 md:grid-cols-2 gap-4 bg-gray-100 p-5 rounded-xl border border-gray-200">
                                    <div><label className="block text-xs md:text-sm font-semibold text-gray-600 mb-1.5">Keputusan Majelis Tanggal</label><input type="text" disabled className="w-full p-2.5 border border-gray-300 rounded-lg bg-gray-200 text-sm md:text-base" /></div>
                                    <div><label className="block text-xs md:text-sm font-semibold text-gray-600 mb-1.5">Nomor Keputusan</label><input type="text" disabled className="w-full p-2.5 border border-gray-300 rounded-lg bg-gray-200 text-sm md:text-base" /></div>
                                    <div className="md:col-span-2"><label className="block text-xs md:text-sm font-semibold text-gray-600 mb-1.5">Diproses Tanggal</label><input type="text" disabled className="w-full p-2.5 border border-gray-300 rounded-lg bg-gray-200 text-sm md:text-base" /></div>
                                </div>
                            </div>
                            <button type="submit" className="w-full bg-gray-900 hover:bg-gray-800 text-white font-bold py-4 rounded-xl transition mt-10 text-lg flex justify-center items-center shadow-lg">Lanjut Preview Formulir &rarr;</button>
                        </form>
                    </div>
                </div>
            );
        };

        const LoginModal = ({ isOpen, onClose, onSuccess }) => {
            const [password, setPassword] = React.useState('');
            const [error, setError] = React.useState(false);

            if (!isOpen) return null;

            const handleLogin = (e) => {
                e.preventDefault();
                if (password === 'admin954') { setError(false); setPassword(''); onSuccess(); } else { setError(true); }
            };

            const handleLupaPassword = () => {
                const subject = encodeURIComponent("Permintaan Reset Password Admin ART1S");
                const body = encodeURIComponent("Syalom,\n\nSaya ingin mengajukan permohonan untuk mereset password Admin untuk web ART1S Tidar 1.\n\nTerima kasih.");
                window.location.href = `mailto:tidar1.gmahk@gmail.com?subject=${subject}&body=${body}`;
            };

            return (
                <div className="fixed inset-0 z-[100] flex items-center justify-center bg-black bg-opacity-60 px-4 backdrop-blur-sm animate-fade-in">
                    <div className="bg-white rounded-2xl shadow-2xl p-6 md:p-8 max-w-sm w-full relative">
                        <button onClick={onClose} className="absolute top-4 right-4 text-gray-400 hover:text-gray-600">&times;</button>
                        <div className="flex justify-center mb-5"><div className="w-16 h-16 md:w-20 md:h-20 bg-gray-900 rounded-full flex items-center justify-center text-white"><Icon name="Settings" className="w-8 h-8 md:w-10 md:h-10" /></div></div>
                        <h2 className="text-2xl md:text-3xl font-bold text-center text-gray-800 mb-2">Admin Login</h2>
                        <p className="text-sm md:text-base text-center text-gray-500 mb-6 md:mb-8">Masuk untuk mengelola jadwal, data jemaat, dan media konten.</p>
                        <form onSubmit={handleLogin}>
                            <div className="mb-5">
                                <label className="block text-sm md:text-base font-bold text-gray-700 mb-2">Password</label>
                                <input type="password" value={password} onChange={(e) => setPassword(e.target.value)} autoFocus className={`w-full p-3.5 border ${error ? 'border-red-500 bg-red-50' : 'border-gray-300'} rounded-xl focus:ring-2 focus:ring-gray-800 outline-none transition text-base`} placeholder="Masukkan password..." />
                                {error && <p className="text-red-500 text-sm mt-2 font-bold">Password salah, coba lagi.</p>}
                            </div>
                            <button type="submit" className="w-full bg-gray-900 hover:bg-gray-800 text-white font-bold py-3.5 rounded-xl transition shadow-md text-base">Masuk ke Dashboard</button>
                        </form>
                        <div className="mt-6 text-center"><button onClick={handleLupaPassword} className="text-sm md:text-base font-medium text-gray-500 hover:text-gray-900 hover:underline">Lupa Password?</button></div>
                    </div>
                </div>
            );
        };

        const AdminDashboard = ({ dataPejabat, setDataPejabat, jadwalDB, setJadwalDB, videos, setVideos }) => {
            const [adminTab, setAdminTab] = React.useState('jadwal');
            const [viewMonth, setViewMonth] = React.useState(new Date().getMonth());
            const [viewYear, setViewYear] = React.useState(new Date().getFullYear());
            const [subTab, setSubTab] = React.useState('rabu'); 
            const [editingDate, setEditingDate] = React.useState(null);
            const [editForm, setEditForm] = React.useState([]);
            const [isSavingJadwal, setIsSavingJadwal] = React.useState(false);
            const [isSavingPejabat, setIsSavingPejabat] = React.useState(false);
            const [isSavingVideos, setIsSavingVideos] = React.useState(false);

            const monthNames = ['Januari', 'Februari', 'Maret', 'April', 'Mei', 'Juni', 'Juli', 'Agustus', 'September', 'Oktober', 'November', 'Desember'];
            
            const getTriwulan = (m) => {
                if (m < 3) return "JANUARI - MARET";
                if (m < 6) return "APRIL - JUNI";
                if (m < 9) return "JULI - SEPTEMBER";
                return "OKTOBER - DESEMBER";
            };

            const prevMonth = () => { if (viewMonth === 0) { setViewMonth(11); setViewYear(viewYear - 1); } else { setViewMonth(viewMonth - 1); } setEditingDate(null); };
            const nextMonth = () => { if (viewMonth === 11) { setViewMonth(0); setViewYear(viewYear + 1); } else { setViewMonth(viewMonth + 1); } setEditingDate(null); };

            const getDatesForMonth = (year, month, dayOfWeek) => {
                let d = new Date(year, month, 1);
                let dates = [];
                while (d.getDay() !== dayOfWeek) { d.setDate(d.getDate() + 1); }
                while (d.getMonth() === month) { dates.push(toYMD(d)); d.setDate(d.getDate() + 7); }
                return dates;
            };

            const isRabu = subTab === 'rabu';
            const targetDates = isRabu ? getDatesForMonth(viewYear, viewMonth, 3) : getDatesForMonth(viewYear, viewMonth, 6);

            const getActiveArray = (rowData, tab) => {
                if (tab === 'rabu') return rowData.petugas;
                if (tab === 'sekolahSabat') return rowData.sekolahSabat;
                if (tab === 'khotbah') return rowData.khotbah;
                if (tab === 'diakon') return rowData.diakon;
                if (tab === 'musik') return rowData.musik;
                if (tab === 'perjamuan') return rowData.perjamuan;
                return [];
            };

            const subTabs = [
                { id: 'rabu', label: 'Rabu: Permintaan Doa' },
                { id: 'sekolahSabat', label: 'Sekolah Sabat' },
                { id: 'khotbah', label: 'Ibadah Khotbah' },
                { id: 'musik', label: 'Petugas Musik' },
                { id: 'diakon', label: 'Petugas Diakon' },
                { id: 'perjamuan', label: 'Perjamuan Kudus' }
            ];

            const currentSubTabLabel = subTabs.find(t => t.id === subTab)?.label || '';
            const columns = getActiveArray(isRabu ? initialJadwalRabu : initialJadwalSabat, subTab).map(p => p.tugas);

            const handleEditClick = (date) => {
                setEditingDate(date);
                const existingData = jadwalDB[date] || (isRabu ? initialJadwalRabu : initialJadwalSabat);
                setEditForm(JSON.parse(JSON.stringify(getActiveArray(existingData, subTab))));
            };

            const handleEditFormChange = (index, value) => {
                const newForm = [...editForm];
                newForm[index].nama = value;
                setEditForm(newForm);
            };

            const handleSaveRow = (date) => {
                const baseData = jadwalDB[date] ? JSON.parse(JSON.stringify(jadwalDB[date])) : JSON.parse(JSON.stringify(isRabu ? initialJadwalRabu : initialJadwalSabat));
                if (subTab === 'rabu') baseData.petugas = editForm;
                else if (subTab === 'sekolahSabat') baseData.sekolahSabat = editForm;
                else if (subTab === 'khotbah') baseData.khotbah = editForm;
                else if (subTab === 'diakon') baseData.diakon = editForm;
                else if (subTab === 'musik') baseData.musik = editForm;
                else if (subTab === 'perjamuan') baseData.perjamuan = editForm;
                
                setIsSavingJadwal(true);
                
                fetch(GAS_API_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'text/plain;charset=utf-8' },
                    body: JSON.stringify({ action: 'saveJadwal', tanggal: date, payload: baseData })
                })
                .then(res => res.json())
                .then(result => {
                    setIsSavingJadwal(false);
                    if (result.success) {
                        setJadwalDB({...jadwalDB, [date]: baseData});
                        setEditingDate(null);
                    } else { alert("Gagal menyimpan: " + result.error); }
                })
                .catch(err => {
                    setIsSavingJadwal(false);
                    console.error("Fetch error:", err);
                    alert("Terjadi kesalahan jaringan.");
                });
            };

            const handleDeleteRow = (date) => {
                if(!jadwalDB[date]) return; 
                if(window.confirm(`Kembalikan jadwal ${formatIndoDateShort(date)} ke default?`)) {
                    setIsSavingJadwal(true);
                    const defaultData = JSON.parse(JSON.stringify(isRabu ? initialJadwalRabu : initialJadwalSabat));
                    
                    fetch(GAS_API_URL, {
                        method: 'POST',
                        headers: { 'Content-Type': 'text/plain;charset=utf-8' },
                        body: JSON.stringify({ action: 'saveJadwal', tanggal: date, payload: defaultData })
                    })
                    .then(res => res.json())
                    .then(result => {
                        setIsSavingJadwal(false);
                        if (result.success) {
                            const newDB = {...jadwalDB}; 
                            delete newDB[date]; 
                            setJadwalDB(newDB);
                        }
                    })
                    .catch(err => {
                        setIsSavingJadwal(false);
                        console.error(err);
                    });
                }
            };

            const handleSimpanPejabat = () => {
                setIsSavingPejabat(true);

                fetch(GAS_API_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'text/plain;charset=utf-8' },
                    body: JSON.stringify({ action: 'savePejabat', payload: dataPejabat })
                })
                .then(res => res.json())
                .then(result => {
                    setIsSavingPejabat(false);
                    if (result.success) alert("Berhasil! Data Pelayan Jemaat sudah tersimpan ke Google Sheets.");
                    else alert("Gagal menyimpan: " + result.error);
                })
                .catch(err => {
                    setIsSavingPejabat(false);
                    console.error(err);
                    alert("Terjadi kesalahan jaringan.");
                });
            };

            const handleSimpanVideos = () => {
                setIsSavingVideos(true);

                fetch(GAS_API_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'text/plain;charset=utf-8' },
                    body: JSON.stringify({ action: 'saveVideos', payload: videos })
                })
                .then(res => res.json())
                .then(result => {
                    setIsSavingVideos(false);
                    if (result.success) alert("Berhasil! Pengaturan URL Video sudah tersimpan.");
                    else alert("Gagal menyimpan: " + result.error);
                })
                .catch(err => {
                    setIsSavingVideos(false);
                    console.error(err);
                    alert("Terjadi kesalahan jaringan.");
                });
            };

            const handleFileChange = (e, id) => {
                const file = e.target.files[0];
                if (!file) return;
                
                const reader = new FileReader();
                reader.readAsDataURL(file);
                reader.onload = (event) => {
                    const img = new Image();
                    img.src = event.target.result;
                    img.onload = () => {
                        const MAX_WIDTH = 150;
                        const MAX_HEIGHT = 150;
                        let width = img.width;
                        let height = img.height;

                        if (width > height) {
                            if (width > MAX_WIDTH) { height *= MAX_WIDTH / width; width = MAX_WIDTH; }
                        } else {
                            if (height > MAX_HEIGHT) { width *= MAX_HEIGHT / height; height = MAX_HEIGHT; }
                        }

                        const canvas = document.createElement('canvas');
                        canvas.width = width;
                        canvas.height = height;
                        const ctx = canvas.getContext('2d');
                        ctx.drawImage(img, 0, 0, width, height);

                        const dataUrl = canvas.toDataURL('image/jpeg', 0.6);
                        
                        const updated = dataPejabat.map(p => p.id === id ? { ...p, img: dataUrl } : p);
                        setDataPejabat(updated);
                    };
                };
            };

            const handleUbahText = (id, field, value) => { const updated = dataPejabat.map(p => p.id === id ? { ...p, [field]: value } : p); setDataPejabat(updated); };
            const handleHapusPejabat = (id) => { if(window.confirm("Yakin ingin menghapus data pelayan ini?")) { setDataPejabat(dataPejabat.filter(p => p.id !== id)); } };

            return (
                <div className="space-y-6 animate-fade-in">
                    <div className="bg-white rounded-xl shadow-sm border border-gray-100 overflow-hidden">
                        <div className="flex border-b border-gray-200 overflow-x-auto hide-scrollbar">
                            <button onClick={() => setAdminTab('jadwal')} className={`flex-1 min-w-[140px] py-4 font-bold text-sm md:text-base text-center transition-colors ${adminTab === 'jadwal' ? 'bg-gray-900 text-white' : 'text-gray-600 hover:bg-gray-50'}`}>Kelola Jadwal</button>
                            <button onClick={() => setAdminTab('pelayan')} className={`flex-1 min-w-[170px] py-4 font-bold text-sm md:text-base text-center transition-colors ${adminTab === 'pelayan' ? 'bg-gray-900 text-white' : 'text-gray-600 hover:bg-gray-50'}`}>Kelola Pelayan Jemaat</button>
                            <button onClick={() => setAdminTab('media')} className={`flex-1 min-w-[140px] py-4 font-bold text-sm md:text-base text-center transition-colors ${adminTab === 'media' ? 'bg-gray-900 text-white' : 'text-gray-600 hover:bg-gray-50'}`}>Kelola Konten</button>
                        </div>

                        <div className={`p-4 md:p-6 ${adminTab === 'jadwal' ? 'bg-[#f4f7fa]' : 'bg-white'}`}>
                            {adminTab === 'jadwal' && (
                                <div className="animate-fade-in space-y-4">
                                    <div className="bg-[#eef2f6] rounded-xl flex overflow-x-auto border border-gray-200 p-2 gap-2 hide-scrollbar">
                                        {subTabs.map(tab => (
                                            <button key={tab.id} onClick={() => { setSubTab(tab.id); setEditingDate(null); }} className={`px-4 py-2.5 rounded-lg text-sm md:text-base whitespace-nowrap transition-colors ${subTab === tab.id ? 'bg-white shadow-sm font-bold border border-gray-200 text-slate-800' : 'font-medium text-slate-500 hover:bg-slate-200'}`}>
                                                {tab.label}
                                            </button>
                                        ))}
                                    </div>
                                    
                                    {subTab === 'perjamuan' && (
                                        <div className="bg-purple-50 border border-purple-200 p-4 md:p-5 rounded-xl text-purple-800 text-sm md:text-base flex items-start shadow-sm">
                                            <Icon name="Gift" className="w-6 h-6 mr-3 shrink-0" />
                                            <p><b>Jadwal Spesial:</b> Perjamuan Kudus hanya dilaksanakan pada <span className="font-bold underline">Sabtu terakhir</span> di bulan Maret, Juni, Oktober, dan Desember. Mengisi jadwal pada tanggal lain tidak akan memunculkannya secara otomatis di bulan tersebut.</p>
                                        </div>
                                    )}

                                    <div className="bg-white border border-gray-200 rounded-xl shadow-sm overflow-hidden">
                                        <div className="flex flex-col md:flex-row justify-between items-center p-4 md:p-5 border-b border-gray-200 gap-4 bg-white">
                                            <div className="flex items-center">
                                                <span className="w-3 h-3 md:w-4 md:h-4 rounded-full bg-slate-800 mr-3 hidden md:block"></span>
                                                <div><h3 className="font-bold text-lg md:text-xl text-slate-800">{currentSubTabLabel}</h3><p className="text-xs text-slate-500 uppercase tracking-wider font-bold">Triwulan: {getTriwulan(viewMonth)}</p></div>
                                            </div>
                                            <div className="flex items-center border border-gray-300 rounded-lg overflow-hidden bg-white shadow-sm">
                                                <button onClick={prevMonth} className="p-2.5 hover:bg-slate-100 transition"><Icon name="ChevronLeft" className="w-5 h-5 text-slate-600" /></button>
                                                <div className="px-4 py-2 font-bold text-sm md:text-base bg-white flex items-center min-w-[150px] md:min-w-[180px] justify-center text-slate-800"><Icon name="Calendar" className="w-4 h-4 md:w-5 md:h-5 mr-2 text-slate-500" />{monthNames[viewMonth].toUpperCase()} {viewYear}</div>
                                                <button onClick={nextMonth} className="p-2.5 hover:bg-slate-100 transition"><Icon name="ChevronRight" className="w-5 h-5 text-slate-600" /></button>
                                            </div>
                                        </div>
                                        <div className="overflow-x-auto">
                                            <table className={`w-full text-left border-collapse ${subTab === 'perjamuan' ? 'min-w-[2800px]' : 'min-w-[800px]'}`}>
                                                <thead className="bg-[#eef2f6] border-b border-gray-200">
                                                    <tr>
                                                        <th className="p-4 text-xs md:text-sm font-extrabold text-slate-700 uppercase tracking-wider text-center w-40">Tanggal</th>
                                                        {columns.map((col, i) => <th key={i} className="p-4 text-xs md:text-sm font-extrabold text-slate-700 uppercase tracking-wider text-center">{col}</th>)}
                                                        <th className="p-4 text-xs md:text-sm font-extrabold text-slate-700 uppercase tracking-wider text-center w-32">Aksi</th>
                                                    </tr>
                                                </thead>
                                                <tbody className="divide-y divide-gray-100 bg-white">
                                                    {targetDates.map(date => {
                                                        const isEditing = editingDate === date;
                                                        const rowData = jadwalDB[date] || (isRabu ? initialJadwalRabu : initialJadwalSabat);
                                                        const dataArray = getActiveArray(rowData, subTab);
                                                        const isSaved = !!jadwalDB[date] && (subTab === 'rabu' ? !!jadwalDB[date].petugas : !!jadwalDB[date][subTab]);
                                                        
                                                        return (
                                                            <tr key={date} className="hover:bg-slate-50 transition group">
                                                                <td className="p-4 md:p-5 text-center align-middle border-r border-gray-50 bg-slate-50/30">
                                                                    <div className="font-bold text-slate-500 text-xs md:text-sm mb-0.5">{isRabu ? 'RABU' : 'SABTU'}</div>
                                                                    <div className="text-sm md:text-base font-extrabold text-slate-800">{formatIndoDateShort(date)}</div>
                                                                </td>
                                                                {dataArray.map((p, i) => (
                                                                    <td key={i} className="p-4 md:p-5 text-center align-middle border-r border-gray-50">
                                                                        {isEditing ? (
                                                                            <input type="text" value={editForm[i]?.nama || ''} onChange={(e) => handleEditFormChange(i, e.target.value)} className="w-full p-2.5 border border-blue-400 rounded-lg text-sm md:text-base text-center font-bold focus:ring-2 focus:ring-blue-500 outline-none shadow-inner" />
                                                                        ) : (
                                                                            <div className="flex flex-col items-center">
                                                                                <span className="font-bold text-slate-800 text-sm md:text-base mb-1.5">{p.nama}</span>
                                                                                <span className={`text-[10px] md:text-xs px-2.5 py-1 rounded-full font-bold uppercase tracking-wider shadow-sm ${isSaved ? 'bg-[#fff5e6] text-[#e59c3f] border border-[#f5dfb8]' : 'bg-white text-gray-400 border border-gray-200'}`}>{isSaved ? 'Terkunci' : 'Default'}</span>
                                                                            </div>
                                                                        )}
                                                                    </td>
                                                                ))}
                                                                <td className="p-4 md:p-5 text-center align-middle">
                                                                    {isEditing ? (
                                                                        <div className="flex justify-center space-x-2">
                                                                            <button onClick={() => handleSaveRow(date)} disabled={isSavingJadwal} className={`p-2.5 text-white bg-green-500 hover:bg-green-600 rounded-lg transition shadow-sm ${isSavingJadwal ? 'opacity-50' : ''}`}><Icon name="Check" className="w-5 h-5" /></button>
                                                                            <button onClick={() => setEditingDate(null)} className="p-2.5 text-white bg-slate-400 hover:bg-slate-500 rounded-lg transition shadow-sm"><Icon name="X" className="w-5 h-5" /></button>
                                                                        </div>
                                                                    ) : (
                                                                        <div className="flex justify-center space-x-2 opacity-100 md:opacity-0 group-hover:opacity-100 transition-opacity">
                                                                            <button onClick={() => handleEditClick(date)} className="p-2.5 text-slate-500 hover:text-slate-800 hover:bg-slate-200 rounded-lg transition" title="Edit Baris"><Icon name="Edit" className="w-5 h-5" /></button>
                                                                            {isSaved ? (<button onClick={() => handleDeleteRow(date)} className="p-2.5 text-slate-500 hover:text-red-600 hover:bg-red-100 rounded-lg transition" title="Hapus (Kembali ke Default)"><Icon name="Trash" className="w-5 h-5" /></button>) : (<div className="w-10"></div>)}
                                                                        </div>
                                                                    )}
                                                                </td>
                                                            </tr>
                                                        )
                                                    })}
                                                </tbody>
                                            </table>
                                        </div>
                                    </div>
                                </div>
                            )}

                            {adminTab === 'pelayan' && (
                                <div className="space-y-4 animate-fade-in bg-white p-2 md:p-4 rounded-xl">
                                    <div className="flex justify-between items-center bg-green-50 p-4 md:p-5 rounded-xl border border-green-200">
                                        <p className="text-sm md:text-base text-green-800 font-bold w-2/3">Edit tabel di bawah, tekan ikon potret untuk ganti foto dari HP, lalu simpan perubahan.</p>
                                        <button onClick={handleSimpanPejabat} disabled={isSavingPejabat} className={`${isSavingPejabat ? 'bg-gray-400' : 'bg-green-600 hover:bg-green-700'} text-white font-bold py-3 px-4 md:px-6 rounded-lg transition shadow-md text-sm md:text-base`}>{isSavingPejabat ? 'Menyimpan...' : 'Simpan Pejabat'}</button>
                                    </div>
                                    <div className="overflow-x-auto border border-gray-200 rounded-xl">
                                        <table className="w-full text-left text-sm md:text-base border-collapse min-w-[700px]">
                                            <thead>
                                                <tr className="bg-gray-100 text-gray-600 uppercase text-xs md:text-sm tracking-wider font-bold"><th className="p-4">Foto</th><th className="p-4">Jabatan</th><th className="p-4">Nama Lengkap</th><th className="p-4">No WhatsApp (62xxx)</th><th className="p-4 text-center">Aksi</th></tr>
                                            </thead>
                                            <tbody>
                                                {dataPejabat.map((p) => (
                                                    <tr key={p.id} className="border-b border-gray-100 hover:bg-gray-50 transition">
                                                        <td className="p-4"><div className="relative w-14 h-14 md:w-16 md:h-16"><img src={p.img} alt={p.nama} className="w-full h-full rounded-full object-cover border border-gray-200 bg-white" /><label className="absolute -bottom-1 -right-1 bg-white border border-gray-300 rounded-full p-1 cursor-pointer hover:bg-gray-100 shadow-sm"><Icon name="Edit" className="w-4 h-4 text-gray-600" /><input type="file" accept="image/*" className="hidden" onChange={(e) => handleFileChange(e, p.id)} /></label></div></td>
                                                        <td className="p-4"><input type="text" value={p.jabatan} onChange={(e) => handleUbahText(p.id, 'jabatan', e.target.value)} className="w-full p-2.5 border border-gray-200 rounded-lg focus:ring-2 focus:ring-green-500 outline-none font-bold text-sm md:text-base" /></td>
                                                        <td className="p-4"><input type="text" value={p.nama} onChange={(e) => handleUbahText(p.id, 'nama', e.target.value)} className="w-full p-2.5 border border-gray-200 rounded-lg focus:ring-2 focus:ring-green-500 outline-none font-bold text-sm md:text-base" /></td>
                                                        <td className="p-4"><input type="text" value={p.wa} onChange={(e) => handleUbahText(p.id, 'wa', e.target.value)} className="w-full p-2.5 border border-gray-200 rounded-lg focus:ring-2 focus:ring-green-500 outline-none font-mono text-sm md:text-base" /></td>
                                                        <td className="p-4 text-center"><button onClick={() => handleHapusPejabat(p.id)} className="p-2.5 text-red-500 hover:bg-red-50 hover:text-red-700 rounded-lg transition" title="Hapus Data"><Icon name="Trash" className="w-5 h-5" /></button></td>
                                                    </tr>
                                                ))}
                                            </tbody>
                                        </table>
                                    </div>
                                </div>
                            )}

                            {adminTab === 'media' && (
                                <div className="space-y-4 animate-fade-in bg-white p-2 md:p-4 rounded-xl">
                                    <div className="flex justify-between items-center bg-blue-50 p-4 md:p-5 rounded-xl border border-blue-200 mb-6">
                                        <p className="text-sm md:text-base text-blue-800 font-bold w-2/3">Atur URL embed video YouTube untuk halaman Home dan Live Streaming.</p>
                                        <button onClick={handleSimpanVideos} disabled={isSavingVideos} className={`${isSavingVideos ? 'bg-gray-400' : 'bg-blue-600 hover:bg-blue-700'} text-white font-bold py-3 px-4 md:px-6 rounded-lg transition shadow-md text-sm md:text-base`}>
                                            {isSavingVideos ? 'Menyimpan...' : 'Simpan Konten'}
                                        </button>
                                    </div>
                                    
                                    <div className="space-y-6">
                                        <div className="bg-gray-50 p-5 md:p-6 rounded-xl border border-gray-200 shadow-sm">
                                            <label className="flex items-center text-sm md:text-base font-bold text-gray-800 mb-2">
                                                <Icon name="Video" className="w-5 h-5 mr-2 text-red-600"/> URL Video Home (Terbaru)
                                            </label>
                                            <p className="text-xs md:text-sm text-gray-500 mb-4">Masukkan link YouTube yang ingin ditampilkan di halaman Home (wajib menggunakan format embed: https://www.youtube.com/embed/...)</p>
                                            <input type="text" value={videos.homeVideo} onChange={e => setVideos({...videos, homeVideo: e.target.value})} className="w-full p-3.5 border border-gray-300 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none text-sm md:text-base font-medium" placeholder="https://www.youtube.com/embed/..." />
                                        </div>
                                        
                                        <div className="bg-gray-50 p-5 md:p-6 rounded-xl border border-gray-200 shadow-sm">
                                            <label className="flex items-center text-sm md:text-base font-bold text-gray-800 mb-2">
                                                <Icon name="Video" className="w-5 h-5 mr-2 text-red-600"/> URL Video Live Streaming
                                            </label>
                                            <p className="text-xs md:text-sm text-gray-500 mb-4">Masukkan link YouTube yang ingin ditampilkan di halaman Live (wajib menggunakan format embed: https://www.youtube.com/embed/...)</p>
                                            <input type="text" value={videos.liveVideo} onChange={e => setVideos({...videos, liveVideo: e.target.value})} className="w-full p-3.5 border border-gray-300 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none text-sm md:text-base font-medium" placeholder="https://www.youtube.com/embed/..." />
                                        </div>
                                    </div>
                                </div>
                            )}
                        </div>
                    </div>
                </div>
            );
        };

        const App = () => {
            const [isAppLoading, setIsAppLoading] = React.useState(true);
            const [activeTab, setActiveTab] = React.useState('home');
            const [jadwalDB, setJadwalDB] = React.useState({});
            const [dataPejabat, setDataPejabat] = React.useState(initialDataPejabat);
            const [videos, setVideos] = React.useState(initialVideos);

            const today = new Date();
            today.setHours(0,0,0,0);
            
            let nextRabu = new Date(today);
            nextRabu.setDate(today.getDate() + ((3 - today.getDay() + 7) % 7));
            const rabuYMD = toYMD(nextRabu);
            
            let nextSabat = new Date(today);
            nextSabat.setDate(today.getDate() + ((6 - today.getDay() + 7) % 7));
            const sabatYMD = toYMD(nextSabat);

            const getNextPerjamuan = () => {
                const year = today.getFullYear();
                const months = [2, 5, 9, 11]; // Mar, Jun, Oct, Dec
                for (let m of months) {
                    let lastDay = new Date(year, m + 1, 0);
                    let lastSat = new Date(lastDay);
                    lastSat.setDate(lastDay.getDate() - ((lastDay.getDay() + 1) % 7));
                    if (today <= lastSat) return lastSat;
                }
                let lastDayNextYear = new Date(year + 1, 3, 0);
                let lastSatNextYear = new Date(lastDayNextYear);
                lastSatNextYear.setDate(lastDayNextYear.getDate() - ((lastDayNextYear.getDay() + 1) % 7));
                return lastSatNextYear;
            };

            const nextPerjamuanObj = getNextPerjamuan();
            const perjamuanYMD = toYMD(nextPerjamuanObj);
            
            const diffTime = nextPerjamuanObj - today;
            const diffDays = Math.ceil(diffTime / (1000 * 60 * 60 * 24));
            const showPerjamuan = diffDays <= 8 && diffDays >= 0;

            const activeRabu = jadwalDB[rabuYMD] || initialJadwalRabu;
            const activeSabat = jadwalDB[sabatYMD] || initialJadwalSabat;
            const activePerjamuan = jadwalDB[perjamuanYMD]?.perjamuan || initialJadwalSabat.perjamuan;

            React.useEffect(() => {
                if (GAS_API_URL.includes('MASUKKAN_ID_SCRIPT_KAMU') || !GAS_API_URL.startsWith('http')) {
                    setIsAppLoading(false);
                    return;
                }

                fetch(GAS_API_URL + '?action=getData')
                    .then(response => response.json())
                    .then(data => {
                        if (data.dataPejabat) setDataPejabat(data.dataPejabat);
                        if (data.jadwalDB) setJadwalDB(data.jadwalDB);
                        if (data.videos) setVideos(data.videos);
                        setIsAppLoading(false);
                    })
                    .catch(error => {
                        console.error('Gagal mengambil data dari Google Sheets:', error);
                        setIsAppLoading(false); 
                    });
            }, []);

            const [isAdminLoggedIn, setIsAdminLoggedIn] = React.useState(false);
            const [showLoginModal, setShowLoginModal] = React.useState(false);

            const tabs = [
                { id: 'home', label: 'Home', icon: 'Home' },
                { id: 'belajar', label: 'Belajar', icon: 'BookOpen' },
                { id: 'live', label: 'Live', icon: 'Video' },
                { id: 'jadwal', label: 'Jadwal', icon: 'Calendar' },
                { id: 'persembahan', label: 'Persembahan', icon: 'Gift' }
            ];

            const handleAdminClick = () => { if (isAdminLoggedIn) { setActiveTab('admin_dashboard'); } else { setShowLoginModal(true); } };
            const handleLogout = () => { setIsAdminLoggedIn(false); setActiveTab('home'); };

            const renderContent = () => {
                switch(activeTab) {
                    case 'home': return <Home setActiveTab={setActiveTab} videos={videos} />;
                    case 'belajar': return <Belajar setActiveTab={setActiveTab} />;
                    case 'belajar_alkitab': return <DetailAlkitab setActiveTab={setActiveTab} dataPejabat={dataPejabat} />;
                    case 'belajar_28dasar': return <Detail28Dasar setActiveTab={setActiveTab} dataPejabat={dataPejabat} />;
                    case 'belajar_egw': return <DetailEGW setActiveTab={setActiveTab} dataPejabat={dataPejabat} />;
                    case 'live': return <Live setActiveTab={setActiveTab} activeRabu={activeRabu} activeSabat={activeSabat} rabuYMD={rabuYMD} sabatYMD={sabatYMD} showPerjamuan={showPerjamuan} perjamuanYMD={perjamuanYMD} activePerjamuan={activePerjamuan} videos={videos} />;
                    case 'jadwal': return <Jadwal activeRabu={activeRabu} activeSabat={activeSabat} rabuYMD={rabuYMD} sabatYMD={sabatYMD} showPerjamuan={showPerjamuan} perjamuanYMD={perjamuanYMD} activePerjamuan={activePerjamuan} />;
                    case 'persembahan': return <Persembahan dataPejabat={dataPejabat} />;
                    case 'keanggotaan': return <Keanggotaan setActiveTab={setActiveTab} />;
                    case 'member_baru': return <MemberBaru setActiveTab={setActiveTab} dataPejabat={dataPejabat} />;
                    case 'pindah_masuk': return <PindahMasuk setActiveTab={setActiveTab} dataPejabat={dataPejabat} />;
                    case 'hubungi': return <Hubungi setActiveTab={setActiveTab} dataPejabat={dataPejabat} />;
                    case 'form_acms': return <FormACMS setActiveTab={setActiveTab} />;
                    case 'admin_dashboard': return isAdminLoggedIn ? <AdminDashboard dataPejabat={dataPejabat} setDataPejabat={setDataPejabat} jadwalDB={jadwalDB} setJadwalDB={setJadwalDB} videos={videos} setVideos={setVideos} /> : <Home setActiveTab={setActiveTab} videos={videos} />;
                    default: return <Home setActiveTab={setActiveTab} videos={videos} />;
                }
            };

            if (isAppLoading) {
                return (
                    <div className="min-h-screen bg-gray-50 flex flex-col items-center justify-between py-12">
                        <div className="flex-1 flex flex-col items-center justify-center w-full">
                            <div className="w-12 h-12 md:w-16 md:h-16 border-4 border-blue-200 border-t-blue-600 rounded-full animate-spin mb-5"></div>
                            <p className="text-gray-500 font-bold text-sm md:text-base animate-pulse">Memuat data ART1S...</p>
                        </div>
                        <div className="mt-auto flex flex-col items-center opacity-40">
                            <img src="art1s-outline.svg" alt="ART1S Logo" className="h-8 md:h-10 w-auto mb-2.5" />
                            <span className="text-xs md:text-sm font-bold text-gray-500">Tech Team 2026</span>
                        </div>
                    </div>
                );
            }

            return (
                <div className="min-h-screen bg-gray-50 flex flex-col">
                    <LoginModal isOpen={showLoginModal} onClose={() => setShowLoginModal(false)} onSuccess={() => { setIsAdminLoggedIn(true); setShowLoginModal(false); setActiveTab('admin_dashboard'); }} />

                    <header className="md:hidden bg-white shadow-sm sticky top-0 z-50">
                        <div className="flex justify-between items-center px-5 py-3.5">
                            <img src="art1s-outline.svg" alt="ART1S" className="h-8 w-auto" />
                            {isAdminLoggedIn ? (<button onClick={handleLogout} className="p-2 text-red-600 hover:text-red-800 transition"><Icon name="LogOut" className="w-6 h-6" /></button>) : (<button onClick={handleAdminClick} className="p-2 text-gray-600 hover:text-gray-900 transition"><Icon name="LogIn" className="w-6 h-6" /></button>)}
                        </div>
                    </header>

                    <header className="hidden md:block bg-white shadow-sm sticky top-0 z-50">
                        <div className="max-w-5xl mx-auto px-6 py-4 flex justify-between items-center">
                            <div className="flex items-center space-x-2">
                                <img src="art1s-outline.svg" alt="ART1S" className="h-9 w-auto" />
                            </div>
                            <nav className="flex space-x-2">
                                {tabs.map(tab => (<button key={tab.id} onClick={() => setActiveTab(tab.id)} className={`px-4 py-2.5 rounded-lg font-bold transition flex items-center space-x-2 text-sm md:text-base ${activeTab.startsWith(tab.id) ? 'bg-blue-50 text-blue-700' : 'text-gray-600 hover:bg-gray-100 hover:text-gray-900'}`}><Icon name={tab.icon} className="w-5 h-5" /><span>{tab.label}</span></button>))}
                            </nav>
                            {isAdminLoggedIn ? (
                                <div className="flex items-center space-x-3"><button onClick={() => setActiveTab('admin_dashboard')} className="flex items-center space-x-2 bg-gray-100 text-gray-800 px-5 py-2.5 rounded-lg font-bold hover:bg-gray-200 transition text-sm md:text-base"><Icon name="Settings" className="w-5 h-5" /><span>Dashboard</span></button><button onClick={handleLogout} className="flex items-center space-x-2 border border-red-200 text-red-600 px-4 py-2.5 rounded-lg font-bold hover:bg-red-50 transition text-sm md:text-base"><Icon name="LogOut" className="w-5 h-5" /></button></div>
                            ) : (
                                <button onClick={handleAdminClick} className="flex items-center space-x-2 bg-gray-900 text-white px-5 py-2.5 rounded-lg font-bold hover:bg-gray-800 transition text-sm md:text-base"><Icon name="LogIn" className="w-5 h-5" /><span>Admin Login</span></button>
                            )}
                        </div>
                    </header>

                    <main className="flex-1 max-w-5xl mx-auto w-full p-5 md:p-8 pb-28 md:pb-12">
                        <div className="mb-8 md:mb-10">
                            <h2 className="text-2xl md:text-3xl font-extrabold text-gray-800 capitalize">
                                {activeTab === 'home' ? 'Selamat Datang' : activeTab === 'belajar' ? 'Halaman Belajar' : activeTab.startsWith('belajar_') ? 'Detail Pembelajaran' : activeTab === 'keanggotaan' ? 'Keanggotaan Jemaat' : activeTab === 'member_baru' ? 'Permohonan Member Baru' : activeTab === 'pindah_masuk' ? 'Permohonan Pindah Masuk' : activeTab === 'hubungi' ? 'Hubungi Kami' : activeTab === 'form_acms' ? 'Formulir Pindah Masuk' : activeTab === 'admin_dashboard' ? 'Dashboard Admin' : activeTab}
                            </h2>
                            {activeTab === 'home' && <p className="text-sm md:text-base text-gray-500 mt-2 font-medium">Gereja Masehi Advent Hari Ketujuh Tidar 1 Surabaya</p>}
                            {activeTab === 'admin_dashboard' && <p className="text-sm md:text-base text-gray-500 mt-2 font-medium">Kelola jadwal ibadah, daftar pelayan jemaat, dan media konten web ART1S.</p>}
                        </div>
                        {renderContent()}
                    </main>

                    <nav className="md:hidden fixed bottom-0 w-full bg-white border-t border-gray-200 pb-safe z-50 shadow-[0_-4px_10px_-1px_rgba(0,0,0,0.05)]">
                        <div className="flex justify-around items-center">
                            {tabs.map(tab => (
                                <button key={tab.id} onClick={() => setActiveTab(tab.id)} className={`flex flex-col items-center flex-1 py-3.5 transition ${activeTab.startsWith(tab.id) ? 'text-blue-600' : 'text-gray-500'}`}><Icon name={tab.icon} className={`w-6 h-6 mb-1.5 ${activeTab.startsWith(tab.id) ? 'stroke-[2.5px]' : 'stroke-2'}`} /><span className="text-[11px] font-bold">{tab.label}</span></button>
                            ))}
                        </div>
                    </nav>

                    {/* Floating Action Button (Hubungi / WA) */}
                    {activeTab !== 'admin_dashboard' && activeTab !== 'hubungi' && (
                        <button 
                            onClick={() => setActiveTab('hubungi')}
                            className="fixed bottom-24 md:bottom-8 right-5 md:right-8 z-40 bg-[#25D366] hover:bg-[#20bd5a] text-white p-4 rounded-full shadow-lg hover:shadow-xl transition-all transform hover:scale-110 flex items-center justify-center animate-fade-in"
                            aria-label="Hubungi Kami"
                            title="Hubungi Kami"
                        >
                            <Icon name="Phone" className="w-6 h-6 md:w-8 md:h-8" />
                        </button>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
